name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm check
      - run: pnpm test
      - run: pnpm run package

      # setup-node injects GitHub token as NODE_AUTH_TOKEN which
      # overrides OIDC. Strip it so npm uses trusted publisher auth.
      - name: Strip auth token for OIDC
        run: sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"

      - name: Publish to npm
        run: npm publish --provenance --access public
